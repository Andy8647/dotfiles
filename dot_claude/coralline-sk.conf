# coralline config for DeepSeek / third-party-model sessions (claude-sk).
# Selected by the hybrid statusline via CORALLINE_CONFIG when the session model
# looks like DeepSeek. Inherits the catppuccin theme from coralline.conf, then
# swaps Anthropic-only segments (limit5h/7d, native cost) for permafrost cache
# economics ported in as custom pills.
#
# NOTE: these pills only DISPLAY stats from the running permafrost proxy. They do
# not replace it — permafrost is still what does the caching/savings.

# Inherit style + catppuccin theme from the main config
. "$HOME/.claude/coralline.conf"

# Single line — only what matters for DeepSeek: model, cache hit %, balance.
# (pfsaved / pfspent / pfchurn segments are still defined below but unused;
#  add them back into this list anytime if you want the money breakdown.)
VL_SEGMENTS="dir git model ctx pfhit pfbal clock"
VL_SEGMENTS2=""
VL_SEGMENTS3=""

# Permafrost pill colors (catppuccin accents)
VL_BG_PFHIT="116,199,236"      # sapphire  (❄ cache)
VL_BG_PFSAVED="166,227,161"    # green     (saved)
VL_BG_PFSPENT="245,194,231"    # pink      (spent)
VL_BG_PFBAL="180,190,254"      # lavender  (balance)
VL_BG_PFCHURN="250,179,135"    # peach     (anchor churn warning)

# ── permafrost / DeepSeek connection ─────────────────────────────────────────
PERMAFROST_HOST="${PERMAFROST_HOST:-127.0.0.1}"
PERMAFROST_PORT="${PERMAFROST_PORT:-8787}"
PERMAFROST_USD_CNY="${PERMAFROST_USD_CNY:-7.2}"   # display rate for ¥ figures

_PF_LOADED=0
PF_OK=0 PF_HIT="" PF_SPENT="" PF_SAVED="" PF_SAVED_PCT="" PF_CHURN=0 PF_BAL=""

_load_permafrost() {
  [ "$_PF_LOADED" = "1" ] && return
  _PF_LOADED=1
  command -v jq >/dev/null 2>&1 || return
  local stats sid line
  stats=$(curl -fsS --max-time 1 "http://${PERMAFROST_HOST}:${PERMAFROST_PORT}/permafrost/stats" 2>/dev/null) || return
  [ -n "$stats" ] || return
  sid=$(printf '%s' "$input" | jq -r '.session_id // ""' 2>/dev/null)
  # Per-session hit rate when this session is known to the proxy, else global.
  line=$(printf '%s' "$stats" | jq -r --arg sid "$sid" --argjson rate "$PERMAFROST_USD_CNY" '
    [ ( ((.sessions[$sid].hit_rate) // .hit_rate // 0) * 100 | floor ),
      ( (.cost_usd  // 0) * $rate ),
      ( (.saved_usd // 0) * $rate ),
      ( .saved_pct  // 0 ),
      ( .prefix_changes // 0 )
    ] | map(tostring) | .[]' 2>/dev/null)
  { read -r PF_HIT; read -r PF_SPENT; read -r PF_SAVED; read -r PF_SAVED_PCT; read -r PF_CHURN; } <<EOF
$line
EOF
  PF_OK=1

  # DeepSeek account balance (¥), cached 60s — the statusline refreshes too often
  # to hit the API every render.
  local balcache="${TMPDIR:-/tmp}/deepseek_balance.json" bal=""
  if [ -n "${ANTHROPIC_AUTH_TOKEN:-}" ]; then
    if [ -f "$balcache" ] && [ $(( $(date +%s) - $(stat -f %m "$balcache" 2>/dev/null || stat -c %Y "$balcache" 2>/dev/null || echo 0) )) -lt 60 ]; then
      bal=$(cat "$balcache" 2>/dev/null)
    else
      bal=$(curl -fsS --max-time 2 "https://api.deepseek.com/user/balance" -H "Authorization: Bearer ${ANTHROPIC_AUTH_TOKEN}" 2>/dev/null || true)
      [ -n "$bal" ] && printf '%s' "$bal" > "$balcache" 2>/dev/null
    fi
    [ -n "$bal" ] && PF_BAL=$(printf '%s' "$bal" | jq -r 'first(.balance_infos[]? | select(.currency=="CNY") | .total_balance) // ""' 2>/dev/null)
  fi
}

seg_pfhit() {
  _load_permafrost
  fg "$VL_FG_TEXT"
  if [ "$PF_OK" != "1" ]; then
    push "$VL_BG_PFHIT" "${_FG} ❄ starting… "
    return
  fi
  push "$VL_BG_PFHIT" "${_FG} ❄ ${PF_HIT}% hit "
}

seg_pfsaved() {
  _load_permafrost; [ "$PF_OK" = "1" ] || return 0
  local s p
  printf -v s '%.2f' "$PF_SAVED"     2>/dev/null || s="$PF_SAVED"
  printf -v p '%.0f' "$PF_SAVED_PCT" 2>/dev/null || p="$PF_SAVED_PCT"
  fg "$VL_FG_TEXT"
  push "$VL_BG_PFSAVED" "${_FG} ↓ ¥${s} saved ${p}% "
}

seg_pfspent() {
  _load_permafrost; [ "$PF_OK" = "1" ] || return 0
  local c
  printf -v c '%.3f' "$PF_SPENT" 2>/dev/null || c="$PF_SPENT"
  fg "$VL_FG_TEXT"
  push "$VL_BG_PFSPENT" "${_FG} ¥${c} spent "
}

seg_pfchurn() {
  _load_permafrost
  [ "$PF_OK" = "1" ] && [ "${PF_CHURN:-0}" -gt 0 ] 2>/dev/null || return 0
  fg "$VL_FG_TEXT"
  push "$VL_BG_PFCHURN" "${_FG} ⚠ churn ${PF_CHURN} "
}

seg_pfbal() {
  _load_permafrost; [ -n "$PF_BAL" ] || return 0
  local b
  printf -v b '%.2f' "$PF_BAL" 2>/dev/null || b="$PF_BAL"
  fg "$VL_FG_TEXT"
  push "$VL_BG_PFBAL" "${_FG} 余额 ¥${b} "
}

# ═══════════════════════════════════════════════════════════════════════════════
# Split the built-in `ctx` segment into two: the bar+% stays up front (ctxbar),
# the ↑↓ cr:cw token breakdown is parked on the far right (ctxtok). Custom names
# so the script's own seg_ctx (defined after this conf is sourced) doesn't clobber
# them. All vars/helpers used here are coralline globals available at render time.
# ═══════════════════════════════════════════════════════════════════════════════
seg_ctxbar() {  # context bar + percentage only
  [ -n "$ctx_pct" ] || return 0
  local ci
  printf -v ci '%.0f' "$ctx_pct" 2>/dev/null || ci=0
  make_bar "$ci"; pct_fg "$ci"
  fg "$_PFG"
  push "$VL_BG_CTX" "${_FG} ⬡ ${_BAR} ${ci}% "
}

seg_ctxtok() {  # ↑input ↓output cr:cache-read cw:cache-write breakdown (far right)
  [ -n "$ctx_pct" ] || return 0
  local fgd ti to tcr tcw
  fg "$VL_FG_DIM"; fgd="$_FG"
  fmt_tok "$tok_in";  ti="$_TOK"
  fmt_tok "$tok_out"; to="$_TOK"
  fmt_tok "$tok_cr";  tcr="$_TOK"
  fmt_tok "$tok_cw";  tcw="$_TOK"
  push "$VL_BG_CTX" "${fgd} ↑${ti} ↓${to} cr:${tcr} cw:${tcw} "
}
